<!DOCTYPE html>
<html>

<head>
    <title>8章課題</title>
    <meta name="description" content="このページは8章の課題です。">
    <meta charset="UTF-8">
</head>

<body>
    <header>
        <h1>SAMURAIニュース</h1>
        <nav>
            <a href="https://www.sejuku.net/">ホーム</a>
            <a href="https://www.sejuku.net/">社会</a>
            <a href="https://www.sejuku.net/">経済</a>
            <a href="https://www.sejuku.net/">スポーツ</a>
            <a href="https://www.sejuku.net/">テクノロジー</a>
        </nav>
    </header>
    <main>
        <article>
            <h2>社会</h2>
            <section>
                <h3>和菓子店も「トリックオアトリート！」</h3>
                <p>日本でも年々人気の高まるハロウィン。<br>今年は大手和菓子店5社がハロウィン向けの和菓子セットを共同開発しました。</p>
                <audio controls src="ichi.mp3"></audio>
            </section>
            <section>
                <h3>私のおすすめ和菓子アンケートフォーム</h3>
                <form>
                    <!-- アンケートフォームのHTMLを記述してください -->
                    <div><label for="">氏名</label><input type="text" placeholder="名前を入力してください"></div>
                    <div>
                        <label for="age">年代</label>
                        <select name="" id="age">
                            <option value="underTeen">10代以下</option>
                            <option value="twelve">20代</option>
                            <option value="tirteen">30代</option>
                            <option value="overForteen">40代以上</option>
                        </select>
                    </div>
                    <div>
                        <label name="gender">性別</label>
                        <label for="man">男性</label>
                        <input type="radio" id="man" name="gender">
                        <label for="woman">女性</label>
                        <input type="radio" id="woman" name="gender">
                        <label for="others">その他</label>
                        <input type="radio" id="others" name="gender">                        
                    </div>
                    <div>
                        <label for="">おすすめ和菓子の名称</label>
                        <input type="text" placeholder="例：みたらし団子">
                    </div>
                    <div>
                        <label for="">おすすめする理由</label>
                        <textarea name="reccomend"></textarea>
                    </div>
                    <div>
                        <label for="">個人情報保護方針に同意する</label>
                        <input type="checkbox">
                    </div>
                    <div>
                        <input type="submit" value="送信">
                        <input type="reset" value="リセット">
                    </div>
                </form>
            </section>
        </article>
        <article>
            <h2>テクノロジー</h2>
            <section>
                <h3>SAMURAIが新しい動画をリリース</h3>
                <p>
                    SAMURAI公式YouTubeで新しい動画がリリースされました。<br>動画の内容はHTML/CSSの解説です。
                </p>
            </section>
        </article>
    </main>
    <footer>
        <p>&copy;SAMURAIニュース</p>
    </footer>
</body>

</html>
